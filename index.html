<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strategy Agent — Executive MBA PBS</title>
<style>
  :root {
    --primary: #1a1a2e;
    --secondary: #16213e;
    --accent: #0f3460;
    --highlight: #e94560;
    --text: #eee;
    --text-muted: #999;
    --bg: #0a0a1a;
    --card: #12122a;
    --border: #1e1e3a;
    --success: #2ecc71;
    --warning: #f1c40f;
    --info: #3498db;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, var(--primary), var(--accent));
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .header-icon {
    width: 42px; height: 42px;
    background: var(--highlight);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    box-shadow: 0 4px 15px rgba(233,69,96,0.3);
  }
  .header-text h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .header-text p {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .header-badge {
    margin-left: auto;
    background: rgba(233,69,96,0.15);
    color: var(--highlight);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Main Content */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Chat Area */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    scroll-behavior: smooth;
  }
  .chat-area::-webkit-scrollbar { width: 6px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Messages */
  .message {
    max-width: 85%;
    margin-bottom: 20px;
    animation: fadeIn 0.4s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .message.bot { margin-right: auto; }
  .message.user { margin-left: auto; }

  .message-label {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 6px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .message.user .message-label { text-align: right; }

  .message-bubble {
    padding: 16px 20px;
    border-radius: 16px;
    line-height: 1.6;
    font-size: 14px;
  }
  .message.bot .message-bubble {
    background: var(--card);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
  }
  .message.user .message-bubble {
    background: linear-gradient(135deg, var(--accent), #1a4a8a);
    border-top-right-radius: 4px;
  }

  /* Company Cards */
  .company-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
    margin-top: 16px;
  }
  .company-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  .company-card:hover {
    border-color: var(--highlight);
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(233,69,96,0.15);
  }
  .company-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 4px; height: 100%;
    background: var(--highlight);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .company-card:hover::before { opacity: 1; }
  .company-card h3 {
    font-size: 15px;
    margin-bottom: 4px;
    color: #fff;
  }
  .company-card .sector {
    font-size: 11px;
    color: var(--highlight);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .company-card .desc {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
  }
  .company-card .data-tag {
    display: inline-block;
    background: rgba(233,69,96,0.1);
    color: var(--highlight);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    margin-top: 8px;
    margin-right: 4px;
  }

  /* Question Type Cards */
  .question-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 10px;
    margin-top: 16px;
  }
  .question-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  .question-card:hover {
    border-color: var(--info);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(52,152,219,0.15);
  }
  .question-card .type-badge {
    display: inline-block;
    background: var(--info);
    color: #fff;
    width: 28px; height: 28px;
    border-radius: 8px;
    text-align: center;
    line-height: 28px;
    font-weight: 700;
    font-size: 14px;
    margin-bottom: 8px;
  }
  .question-card h4 { font-size: 13px; margin-bottom: 4px; }
  .question-card .qdesc { font-size: 11px; color: var(--text-muted); line-height: 1.4; }
  .question-card .tools-tag {
    font-size: 10px;
    color: var(--warning);
    margin-top: 8px;
  }

  /* Answer Content */
  .answer-content {
    margin-top: 12px;
  }
  .answer-content h2 {
    font-size: 16px;
    color: var(--highlight);
    margin: 20px 0 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .answer-content h3 {
    font-size: 14px;
    color: var(--info);
    margin: 16px 0 8px;
  }
  .answer-content h4 {
    font-size: 13px;
    color: #ccc;
    margin: 12px 0 6px;
  }
  .answer-content p {
    font-size: 13px;
    line-height: 1.7;
    margin-bottom: 8px;
    color: #ccc;
  }
  .answer-content strong { color: #fff; }
  .answer-content table {
    width: 100%;
    border-collapse: collapse;
    margin: 12px 0;
    font-size: 12px;
  }
  .answer-content th {
    background: rgba(233,69,96,0.15);
    color: var(--highlight);
    padding: 10px 12px;
    text-align: left;
    font-weight: 600;
    border: 1px solid var(--border);
  }
  .answer-content td {
    padding: 8px 12px;
    border: 1px solid var(--border);
    color: #bbb;
  }
  .answer-content tr:hover td { background: rgba(255,255,255,0.02); }
  .answer-content ul, .answer-content ol {
    margin: 8px 0 8px 20px;
    font-size: 13px;
    color: #bbb;
  }
  .answer-content li { margin-bottom: 4px; line-height: 1.6; }
  .answer-content pre {
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    font-size: 12px;
    overflow-x: auto;
    margin: 12px 0;
    color: #aaa;
    font-family: 'Consolas', 'Monaco', monospace;
    white-space: pre-wrap;
  }

  .step-badge {
    display: inline-block;
    background: var(--highlight);
    color: #fff;
    padding: 4px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 700;
    margin: 16px 0 8px;
  }

  /* Loading */
  .typing-indicator {
    display: flex;
    gap: 4px;
    padding: 8px 0;
  }
  .typing-indicator span {
    width: 8px; height: 8px;
    background: var(--text-muted);
    border-radius: 50%;
    animation: bounce 1.4s infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* Back Button */
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    margin-top: 12px;
    transition: all 0.2s;
  }
  .back-btn:hover {
    border-color: var(--highlight);
    color: var(--highlight);
  }

  /* Footer */
  .footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    background: var(--primary);
    flex-shrink: 0;
  }
  .footer-inner {
    display: flex;
    align-items: center;
    gap: 12px;
    max-width: 800px;
    margin: 0 auto;
  }
  .footer input {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .footer input:focus { border-color: var(--accent); }
  .footer input::placeholder { color: #555; }

  .powered-by {
    text-align: center;
    font-size: 10px;
    color: #444;
    margin-top: 8px;
    letter-spacing: 0.5px;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .company-grid { grid-template-columns: 1fr; }
    .question-grid { grid-template-columns: 1fr; }
    .message { max-width: 95%; }
    .header-badge { display: none; }
  }
</style>
</head>

// ─── UI ENGINE ─────────────────────────────────────────────────────────────────

const chatArea = document.getElementById('chatArea');
let currentCompany = null;

function addMessage(content, isBot = true) {
  const msg = document.createElement('div');
  msg.className = `message ${isBot ? 'bot' : 'user'}`;
  msg.innerHTML = `
    <div class="message-label">${isBot ? 'Strategy Agent' : 'You'}</div>
    <div class="message-bubble">${content}</div>
  `;
  chatArea.appendChild(msg);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function addTyping() {
  const msg = document.createElement('div');
  msg.className = 'message bot';
  msg.id = 'typing';
  msg.innerHTML = `
    <div class="message-label">Strategy Agent</div>
    <div class="message-bubble">
      <div class="typing-indicator"><span></span><span></span><span></span></div>
    </div>
  `;
  chatArea.appendChild(msg);
  chatArea.scrollTop = chatArea.scrollHeight;
  return msg;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function showWelcome() {
  addMessage(`
    <p style="margin-bottom:12px">Welcome to the <strong>Strategy Agent</strong> for the Executive MBA at Porto Business School.</p>
    <p style="margin-bottom:12px">I'm an AI-powered strategy analysis agent built using <strong>Claude AI</strong>, specialized in applying the frameworks and methodology of <strong>Professor Lu&iacute;s Filipe Reis</strong>.</p>
    <p style="margin-bottom:16px">I can generate exam-ready strategic analysis for any of the <strong>7 case study companies</strong> using the <strong>Gold Standard 3-Step Method</strong> (Passo 1 → 2 → 3), with 32+ strategic frameworks.</p>
    <p><strong>Select a company to begin:</strong></p>
    <div class="company-grid">
      ${Object.entries(companies).map(([key, c]) => `
        <div class="company-card" onclick="selectCompany('${key}')">
          <h3>${c.name}</h3>
          <div class="sector">${c.sector}</div>
          <div class="desc">${c.desc}</div>
          <div>${c.tags.map(t => `<span class="data-tag">${t}</span>`).join('')}</div>
        </div>
      `).join('')}
    </div>
  `);
}

function selectCompany(key) {
  currentCompany = key;
  const c = companies[key];
  addMessage(`Analyze <strong>${c.name}</strong>`, false);

  const typing = addTyping();
  setTimeout(() => {
    removeTyping();

    // Determine available question types for this company
    const availableTypes = Object.keys(questionTypes).filter(t => answers[`${key}_${t}`]);

    addMessage(`
      <p style="margin-bottom:8px"><strong>${c.header}</strong></p>
      <p style="margin-bottom:4px; font-size:12px; color:var(--text-muted)">${c.context}</p>
      <p style="margin-bottom:16px; font-size:12px; color:var(--highlight)">${c.keyData}</p>
      <p style="margin-bottom:12px">Select the type of strategic analysis:</p>
      <div class="question-grid">
        ${availableTypes.map(t => {
          const q = questionTypes[t];
          return `
            <div class="question-card" onclick="selectQuestion('${key}', '${t}')">
              <div class="type-badge">${t}</div>
              <h4>${q.label}</h4>
              <div class="qdesc">${q.desc}</div>
              <div class="tools-tag">${q.values} | Role: ${q.role}</div>
            </div>
          `;
        }).join('')}
      </div>
      <button class="back-btn" onclick="goBack()">&#8592; Choose another company</button>
    `);
  }, 800);
}

function selectQuestion(companyKey, type) {
  const c = companies[companyKey];
  const q = questionTypes[type];
  addMessage(`${c.name} — Type ${type}: ${q.label}`, false);

  const typing = addTyping();
  setTimeout(() => {
    removeTyping();

    const answerKey = `${companyKey}_${type}`;
    const answerHtml = answers[answerKey] || '<p>Analysis not yet available for this combination.</p>';

    addMessage(`
      <div style="background:rgba(233,69,96,0.08); border-left:3px solid var(--highlight); padding:12px 16px; border-radius:0 8px 8px 0; margin-bottom:16px">
        <strong>${c.name}</strong> — ${c.header}<br>
        <span style="font-size:12px; color:var(--text-muted)">Tipo ${type}: ${q.label} | ${q.values} | Role: ${q.role}</span>
      </div>
      <div class="answer-content">
        ${answerHtml}
      </div>
      <div style="margin-top:20px; padding-top:16px; border-top:1px solid var(--border); font-size:11px; color:var(--text-muted)">
        <em>Preparado para o Exame de Estrat&eacute;gia — Executive MBA PBS (Professor Lu&iacute;s Filipe Reis)</em><br>
        <em>An&aacute;lise gerada pelo Strategy Agent usando o m&eacute;todo Gold Standard (Passo 1→2→3)</em>
      </div>
      <button class="back-btn" onclick="selectCompany('${companyKey}')">&#8592; Other question types for ${c.name}</button>
      <button class="back-btn" onclick="goBack()" style="margin-left:8px">&#8592; Choose another company</button>
    `);
  }, 1200);
}

function goBack() {
  currentCompany = null;
  chatArea.innerHTML = '';
  showWelcome();
}
